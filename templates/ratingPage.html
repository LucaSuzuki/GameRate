<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameRate</title>
    <link rel="icon" href="../static/images/GamRAte.png">


    <link rel="stylesheet" href="../static/style.css" >
</head>
<body>
    <nav>
        <ul>
            <li><img src="../static/images/GamRAte.png" alt="GAMERATE" width="80px"/></li>
            <li><a href="/"><h2>HOME</h2></a></li>
            <li><a href="/ratings"><h2>AVALIAÇÕES</h2></a></li>
        </ul>
    </nav>

    <article>
        <div class="flex-section">
            <h1>RATING PAGE!!</h1>
        </div>
        <div>

            {% if ratings %}
                {% for r in ratings %}

                    <h2>Jogo: {{ r[0] }}        |         Nota: {{ r[1] }}</h2>
                {% endfor %}
            {% else %}
                <p>Sem avaliações!</p>
            {% endif %}
        </div>
    </article>

</body>
</html>
